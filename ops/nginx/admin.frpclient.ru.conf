server {
    server_name admin.frpclient.ru;

    client_max_body_size 25m;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;

    include /etc/nginx/snippets/frpclient-admin-access.conf;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        allow all;
        try_files $uri =404;
    }

    location = / {
        return 302 https://$host/django-admin/;
    }

    location /django-admin/ {
        proxy_pass http://127.0.0.1:8080$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    }

    location /static/ {
        proxy_pass http://127.0.0.1:8080$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    }

    location / {
        return 404;
    }

    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/admin.frpclient.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.frpclient.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    listen [::]:80;
    server_name admin.frpclient.ru;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        allow all;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
