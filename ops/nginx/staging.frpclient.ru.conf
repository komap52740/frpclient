server {
    server_name staging.frpclient.ru;

    client_max_body_size 100m;
    set $staging_csp "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self' https://accounts.google.com https://oauth.yandex.ru https://id.vk.com https://oauth.max.ru https://oauth.telegram.org https://telegram.org; script-src 'self' 'unsafe-inline' https://telegram.org; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://staging.frpclient.ru wss://staging.frpclient.ru; frame-src 'self' https://telegram.org https://oauth.telegram.org; worker-src 'self' blob:; manifest-src 'self'; upgrade-insecure-requests";
    set $staging_permissions_policy "accelerometer=(), autoplay=(), camera=(), display-capture=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=(), fullscreen=(self)";
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Content-Security-Policy $staging_csp always;
    add_header Permissions-Policy $staging_permissions_policy always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    error_page 503 @maintenance;

    set $maintenance_marker /var/www/FRPclient/.deploy.staging/maintenance-mode;
    if (-f $maintenance_marker) {
        return 503;
    }

    location @maintenance {
        root /var/www/FRPclient/ops/nginx;
        add_header Cache-Control "no-store" always;
        add_header Retry-After "120" always;
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "same-origin" always;
        add_header Content-Security-Policy $staging_csp always;
        add_header Permissions-Policy $staging_permissions_policy always;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        try_files /maintenance.html =503;
    }

    location = /healthz {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        proxy_pass http://127.0.0.1:18081$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /django-admin/ {
        return 404;
    }

    location / {
        proxy_pass http://127.0.0.1:18081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection upgrade;
        proxy_read_timeout 300;
    }

    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/staging.frpclient.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.frpclient.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = staging.frpclient.ru) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    listen [::]:80;
    server_name staging.frpclient.ru;
    return 404;
}
