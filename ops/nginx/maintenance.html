<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FRP Client | Техническое окно</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f3efe8;
        --panel: rgba(255, 252, 247, 0.92);
        --text: #1d1a16;
        --muted: #6c6257;
        --accent: #b55d32;
        --border: rgba(29, 26, 22, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(181, 93, 50, 0.18), transparent 30%),
          radial-gradient(circle at bottom right, rgba(69, 103, 131, 0.16), transparent 28%),
          linear-gradient(180deg, #f7f2ea 0%, var(--bg) 100%);
      }

      main {
        width: min(100%, 640px);
        padding: 32px;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: var(--panel);
        box-shadow: 0 20px 60px rgba(29, 26, 22, 0.08);
      }

      .eyebrow {
        margin: 0 0 12px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--accent);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(30px, 4vw, 44px);
        line-height: 1.05;
      }

      p {
        margin: 0;
        font-size: 17px;
        line-height: 1.6;
        color: var(--muted);
      }

      .divider {
        width: 72px;
        height: 4px;
        margin: 24px 0;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--accent), rgba(181, 93, 50, 0.15));
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">FRP Client</p>
      <h1>Идёт обновление сервиса</h1>
      <div class="divider"></div>
      <p>Сайт временно переведён в технический режим. Обычно это занимает всего несколько минут. Обновите страницу немного позже.</p>
    </main>
  </body>
  </html>
