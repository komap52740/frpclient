version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Moscow"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "backend"
    groups:
      django-stack:
        patterns:
          - "Django"
          - "djangorestframework*"
          - "django-*"
          - "channels*"
      test-stack:
        patterns:
          - "pytest*"
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:15"
      timezone: "Europe/Moscow"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "frontend"
    groups:
      react-stack:
        patterns:
          - "react"
          - "react-dom"
          - "react-router-dom"
          - "@tanstack/*"
      mui-stack:
        patterns:
          - "@mui/*"
          - "@emotion/*"
      vite-stack:
        patterns:
          - "vite"
          - "@vitejs/*"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
      timezone: "Europe/Moscow"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
