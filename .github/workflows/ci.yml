name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  release-integrity:
    name: Release Integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify clean reproducible release metadata
        run: python ops/common/source_metadata.py --mode repo --project-dir . --require-clean --format json

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements.lock.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -c requirements.lock.txt

      - name: Check backend dependency set
        run: pip check

      - name: Run backend tests
        run: pytest tests

  backend-dependency-audit:
    name: Backend Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements.lock.txt

      - name: Install audit tooling
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Audit locked backend dependencies
        run: |
          for attempt in 1 2 3; do
            pip-audit -r requirements.lock.txt --progress-spinner off && exit 0
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep 5
          done

  staging-config:
    name: Staging Config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Render staging compose config
        env:
          BACKEND_ENV_FILE: backend/.env.staging.example
          BACKEND_SECRETS_FILE: ops/secrets/backend.staging.secrets.env.example
          FRONTEND_BUILD_SECRETS_FILE: ops/secrets/frontend.staging.build.secrets.env.example
        run: docker compose --env-file .env.staging.example -f docker-compose.prod.yml -f docker-compose.prod.bot.yml config > /tmp/frpclient-staging-compose.yml

  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend quality gate
        run: |
          npm run lint
          npm run format:check
          npm run typecheck
          npm run test
          npm run test:a11y

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  frontend-e2e:
    name: Frontend E2E Smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements.lock.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -c requirements.lock.txt

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run frontend smoke e2e
        env:
          CI: "1"
        run: npm run e2e

  frontend-dependency-audit:
    name: Frontend Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Audit frontend dependencies
        run: |
          for attempt in 1 2 3; do
            npm run audit && exit 0
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep 5
          done
