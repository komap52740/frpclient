server {
    listen 80;
    server_name _;

    client_max_body_size 100M;

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    }

    location /healthz {
        proxy_pass http://backend:8000/healthz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    }

    # React SPA uses /admin/* routes.
    # Django admin is exposed via /django-admin/ to avoid path conflict.
    location /django-admin/ {
        proxy_pass http://backend:8000/django-admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    }

    location /static/ {
        proxy_pass http://backend:8000/static/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /media/ {
        alias /usr/share/nginx/media/;
        try_files $uri =404;
    }

    location = /favicon.ico {
        root /usr/share/nginx/html;
        try_files /favicon.ico =404;
        access_log off;
        log_not_found off;
        add_header Cache-Control "public, max-age=604800";
    }

    location = /robots.txt {
        root /usr/share/nginx/html;
        try_files /robots.txt =404;
        add_header Cache-Control "public, max-age=300";
    }

    location = /sitemap.xml {
        root /usr/share/nginx/html;
        try_files /sitemap.xml =404;
        add_header Cache-Control "public, max-age=300";
    }

    location = /site.webmanifest {
        root /usr/share/nginx/html;
        try_files /site.webmanifest =404;
        add_header Cache-Control "public, max-age=300";
    }

    location = /og-image.svg {
        root /usr/share/nginx/html;
        try_files /og-image.svg =404;
        add_header Cache-Control "public, max-age=3600";
    }

    # Prevent stale HTML shell after deploys (reduces chunk mismatch white screens).
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Static hashed assets can be cached aggressively.
    location /assets/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Serve the SPA shell only for known client routes.
    location = / {
        root /usr/share/nginx/html;
        try_files /index.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location ~ ^/login/?$ {
        root /usr/share/nginx/html;
        try_files /index.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location ~ ^/banned/?$ {
        root /usr/share/nginx/html;
        try_files /index.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    }

    location ~ ^/(client|master|admin|appointments|clients)(/.*)?$ {
        root /usr/share/nginx/html;
        try_files /index.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    }

    # Everything else should be a real 404 instead of SPA 200.
    location / {
        return 404;
    }
}
